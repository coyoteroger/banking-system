version: '3.8'

services:

  postgres-db:
    image: postgres:15-alpine
    container_name: banking-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  banking-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: banking-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banking-network

  customer-service:
    build:
      context: ./customer-service
      dockerfile: Dockerfile
    container_name: banking-customer-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: bankingdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: banking-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "8081:8081"
    depends_on:
      postgres-db:
        condition: service_healthy
      banking-rabbitmq:
        condition: service_healthy
    networks:
      - banking-network
    restart: on-failure

  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    container_name: banking-account-service
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres-db
      DB_PORT: 5432
      DB_NAME: bankingdb
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: banking-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    ports:
      - "8082:8082"
    depends_on:
      postgres-db:
        condition: service_healthy
      banking-rabbitmq:
        condition: service_healthy
    networks:
      - banking-network
    restart: on-failure

volumes:
  postgres-data:

networks:
  banking-network:
    driver: bridge
